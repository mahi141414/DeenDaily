services:
  - type: web
    name: shorts-forge-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "python worker.py & exec gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: CONVEX_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: YOUTUBE_TOKEN_JSON
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: WORKER_POLL_SECONDS
        sync: false
